name: Release Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Validate release tag
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ($env:TAG_NAME -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH."
          }
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt
      - name: Build and verify EXE
        shell: pwsh
        run: ./scripts/build_release.ps1 -Python python
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LSLRecorder-windows
          path: |
            dist/LSLRecorder.exe
            dist/LSLRecorder.exe.sha256
            dist/THIRD_PARTY_LICENSES.txt
            dist/PROJECT_LICENSE.txt
          if-no-files-found: error

  publish-release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Require project license before public publishing
        shell: bash
        run: |
          test -s LICENSE || {
            echo "A reviewed project LICENSE is required before public publishing."
            exit 1
          }
      - name: Download verified artifact
        uses: actions/download-artifact@v4
        with:
          name: LSLRecorder-windows
          path: release
      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --verify-tag --generate-notes --title "LSL Recorder $TAG_NAME"
          gh release upload "$TAG_NAME" release/LSLRecorder.exe release/LSLRecorder.exe.sha256 release/PROJECT_LICENSE.txt release/THIRD_PARTY_LICENSES.txt --clobber
